services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/var/www
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_KEY: base64:QcASpZutFQBqe8aMWvt9k83J7Zy6P0GqrU1Gb/vJiCk=
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: bookings
      DB_USERNAME: bookings
      DB_PASSWORD: password

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bookings
      POSTGRES_USER: bookings
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bookings"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
